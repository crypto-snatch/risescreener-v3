name: Refresh leaderboard

# Re-runs the full-universe indexer on a schedule and commits the fresh 24h
# snapshot. Vercel (connected to this repo) auto-redeploys on the commit, so the
# deployed app always shows up-to-date TOP Traders — no local machine needed.
#
# Private-repo note: GitHub-hosted Actions minutes are limited on private repos
# (~2000 min/month free). The indexer takes ~6 min, so every 3h ≈ 1440 min/month
# stays within the free tier. Increase the frequency if you add paid minutes.

on:
  schedule:
    - cron: "0 * * * *" # hourly — full-universe index (~9.3k accounts, fetches positions+fills+balance)
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-leaderboard
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run indexer
        run: node scripts/index-leaderboard.mjs
      - name: Commit fresh snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore: refresh 24h leaderboard snapshot [skip ci]"
          git pull --rebase --autostash origin main || true
          git push
