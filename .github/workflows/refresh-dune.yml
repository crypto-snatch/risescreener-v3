name: Refresh Dune data

# Pulls RISEx historical metrics from the Dune dashboard and commits data/dune.json.
# Needs a repo secret DUNE_API_KEY (Settings → Secrets and variables → Actions).
# The deployed app reads the committed file via the DUNE_URL env (raw GitHub URL).
# Dune refreshes its queries daily, so we pull once a day at UTC 00:00.

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-dune
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch Dune data
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: node scripts/fetch-dune.mjs
      - name: Commit & push (race-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dune.json
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore: refresh Dune data [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            git push && break || sleep 5
          done
